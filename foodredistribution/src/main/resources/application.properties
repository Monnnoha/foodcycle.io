spring.datasource.url=jdbc:mysql://localhost:3306/food_redistribution
spring.datasource.username=root
spring.datasource.password=Mohansai@12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT configuration — replace secret with a 256-bit (32+ char) value in production
jwt.secret=foodredistribution-super-secret-key-change-in-prod
jwt.expiration-ms=86400000

# Logging
logging.level.com.foodredistribution=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# CORS — comma-separated list of allowed origins
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.info.env.enabled=true

# App info shown at /actuator/info
info.app.name=Food Redistribution API
info.app.version=1.0.0
info.app.description=Spring Boot REST API for food donation and redistribution

# File storage — set to 'cloudinary' to switch providers
storage.provider=local
storage.local.upload-dir=uploads/donations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary — only used when storage.provider=cloudinary
# cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
# cloudinary.api-key=${CLOUDINARY_API_KEY}
# cloudinary.api-secret=${CLOUDINARY_API_SECRET}
